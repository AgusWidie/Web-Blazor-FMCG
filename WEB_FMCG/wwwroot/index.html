<style>
    /* Overlay background fade in */
    @@keyframes modalFadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    /* Modal content slide up and scale */
    @@keyframes modalSlideUp {
        from {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .animate-modal-overlay {
        animation: modalFadeIn 0.3s ease-out forwards;
    }

    .animate-modal-content {
        animation: modalSlideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    @@keyframes iconBounce {
        0% {
            transform: scale(0);
        }

        50% {
            transform: scale(1.2);
        }

        100% {
            transform: scale(1);
        }
    }

    @@keyframes slideInMessage {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-icon {
        animation: iconBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .animate-text {
        animation: slideInMessage 0.4s ease-out forwards;
    }
</style>

<script>

    window.cookieHelper = {
        set: function (name, value, days) {
            const encodedValue = encodeURIComponent(value);
            let expires = "";

            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + days * 864e5);
                expires = "; expires=" + date.toUTCString();
            }

            document.cookie =
                name + "=" + encodedValue +
                expires +
                "; path=/" +
                "; SameSite=Strict" +
                (location.protocol === "https:" ? "; Secure" : "");
        },

        get: function (name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1);
                if (c.indexOf(nameEQ) === 0) {
                    return c.substring(nameEQ.length);
                }
            }
            return null;
        },

        delete: function (name) {
            document.cookie = name + '=; Max-Age=0; path=/';
        }
    };

    function downloadFile(fileName, contentType, byteBase64) {
        const link = document.createElement('a');
        link.download = fileName;

        // convert Base64 ke blob
        const blob = new Blob([Uint8Array.from(atob(byteBase64), c => c.charCodeAt(0))], { type: contentType });
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
    }

    let map;
    let markers = {};

    window.leafletMap = {
        init: function () {
            map = L.map('map').setView([-6.2, 106.8], 10);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        },

        updateMarker: function (salesId, lat, lng, activity) {
            if (!lat || !lng) return;

            if (markers[salesId]) {
                markers[salesId].setLatLng([lat, lng]);
            } else {
                let marker = L.marker([lat, lng])
                    .addTo(map)
                    .bindPopup(`Sales: ${salesId}<br/>${activity}`);

                markers[salesId] = marker;
            }
        },

        focusTo: function (lat, lng) {
            map.setView([lat, lng], 15);
        }
    };
</script>
